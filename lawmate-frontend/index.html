<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LawMate – Legal Queries & Advocate Hiring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Loading Splash Screen — replaced automatically when React mounts -->
      <style>
        #splash-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #0f172a;
          z-index: 99999;
          overflow: hidden;
          font-family: 'Outfit', 'DM Sans', sans-serif;
        }

        /* Animated background orbs */
        #splash-loader .orb {
          position: absolute;
          border-radius: 50%;
          filter: blur(80px);
          opacity: 0.4;
          animation: orbFloat 6s ease-in-out infinite alternate;
        }
        #splash-loader .orb-1 {
          width: 300px; height: 300px;
          background: #6366f1;
          top: -80px; left: -60px;
          animation-delay: 0s;
        }
        #splash-loader .orb-2 {
          width: 250px; height: 250px;
          background: #8b5cf6;
          bottom: -50px; right: -40px;
          animation-delay: -2s;
        }
        #splash-loader .orb-3 {
          width: 180px; height: 180px;
          background: #3b82f6;
          top: 40%; right: 15%;
          animation-delay: -4s;
          opacity: 0.25;
        }

        @keyframes orbFloat {
          0%   { transform: translate(0, 0) scale(1); }
          100% { transform: translate(30px, -20px) scale(1.15); }
        }

        /* Icon container */
        #splash-loader .icon-wrap {
          position: relative;
          z-index: 2;
          margin-bottom: 28px;
        }

        /* Pulsing ring behind icon */
        #splash-loader .icon-ring {
          width: 100px; height: 100px;
          border-radius: 50%;
          border: 2px solid rgba(99, 102, 241, 0.3);
          position: absolute;
          top: 50%; left: 50%;
          transform: translate(-50%, -50%);
          animation: ringPulse 2s ease-out infinite;
        }
        #splash-loader .icon-ring-2 {
          animation-delay: 0.6s;
        }

        @keyframes ringPulse {
          0%   { width: 80px; height: 80px; opacity: 0.6; }
          100% { width: 140px; height: 140px; opacity: 0; }
        }

        /* Scale icon */
        #splash-loader .scale-icon {
          font-size: 48px;
          animation: iconBounce 2s ease-in-out infinite;
          filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.5));
        }

        @keyframes iconBounce {
          0%, 100% { transform: translateY(0) scale(1); }
          50%      { transform: translateY(-6px) scale(1.08); }
        }

        /* Brand name */
        #splash-loader .brand {
          position: relative;
          z-index: 2;
          font-size: 32px;
          font-weight: 700;
          letter-spacing: -0.5px;
          background: linear-gradient(135deg, #818cf8, #6366f1, #a78bfa);
          background-size: 200% 200%;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          animation: gradientShift 3s ease infinite;
          margin-bottom: 8px;
        }

        @keyframes gradientShift {
          0%, 100% { background-position: 0% 50%; }
          50%      { background-position: 100% 50%; }
        }

        /* Tagline */
        #splash-loader .tagline {
          position: relative;
          z-index: 2;
          font-size: 13px;
          color: #94a3b8;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          margin-bottom: 40px;
          opacity: 0;
          animation: fadeUp 0.8s ease 0.3s forwards;
        }

        @keyframes fadeUp {
          to { opacity: 1; transform: translateY(0); }
          from { opacity: 0; transform: translateY(8px); }
        }

        /* Loading bar */
        #splash-loader .loader-track {
          position: relative;
          z-index: 2;
          width: 200px;
          height: 3px;
          background: rgba(99, 102, 241, 0.15);
          border-radius: 4px;
          overflow: hidden;
        }

        #splash-loader .loader-bar {
          height: 100%;
          width: 40%;
          border-radius: 4px;
          background: linear-gradient(90deg, #6366f1, #a78bfa, #6366f1);
          background-size: 200% 100%;
          animation: loaderSlide 1.5s ease-in-out infinite, loaderGradient 2s linear infinite;
        }

        @keyframes loaderSlide {
          0%   { transform: translateX(-100%); }
          100% { transform: translateX(350%); }
        }

        @keyframes loaderGradient {
          0%   { background-position: 0% 0%; }
          100% { background-position: 200% 0%; }
        }

        /* Dots */
        #splash-loader .dots {
          position: relative;
          z-index: 2;
          display: flex;
          gap: 6px;
          margin-top: 20px;
        }
        #splash-loader .dots span {
          width: 6px; height: 6px;
          border-radius: 50%;
          background: #6366f1;
          opacity: 0.3;
          animation: dotPulse 1.4s ease-in-out infinite;
        }
        #splash-loader .dots span:nth-child(2) { animation-delay: 0.2s; }
        #splash-loader .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
          0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
          40%           { opacity: 1; transform: scale(1.4); }
        }
      </style>

      <div id="splash-loader">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <div class="icon-wrap">
          <div class="icon-ring"></div>
          <div class="icon-ring icon-ring-2"></div>
          <div class="scale-icon">⚖️</div>
        </div>

        <div class="brand">LawMate</div>
        <div class="tagline">Your Legal Companion</div>

        <div class="loader-track">
          <div class="loader-bar"></div>
        </div>

        <div class="dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
